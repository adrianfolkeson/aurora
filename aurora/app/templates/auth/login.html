{% extends "base.html" %}

{% block title %}Logga in - Aurora{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <h1><i class="bi bi-person-circle"></i> Logga in</h1>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" name="email" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="password">Lösenord</label>
                    <input type="password" id="password" name="password" required class="form-input">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Logga in</button>
            </form>
            <p class="auth-link">Inget konto? <a href="{{ url_for('auth.register') }}">Skapa ett</a></p>
        </div>
    </div>
</div>
{% endblock %}
