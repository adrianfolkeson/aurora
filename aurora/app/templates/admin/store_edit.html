{% extends "base.html" %}

{% block title %}{% if store %}Redigera{% else %}Lägg till{% endif %} butik - Aurora Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="container">
        <h1><i class="bi bi-shop"></i> {% if store %}Redigera{% else %}Lägg till{% endif %} butik</h1>
        
        <form method="POST" class="edit-form">
            <div class="form-group">
                <label for="name">Butikens namn *</label>
                <input type="text" id="name" name="name" value="{{ store.name if store else '' }}" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="url">URL *</label>
                <input type="url" id="url" name="url" value="{{ store.url if store else '' }}" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="logo">Logotyp-URL</label>
                <input type="url" id="logo" name="logo" value="{{ store.logo if store else '' }}" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="rating">Rating (0-5)</label>
                <input type="number" id="rating" name="rating" value="{{ store.rating if store else 0 }}" min="0" max="5" step="0.1" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="affiliate_network">Affiliate-nätverk</label>
                <input type="text" id="affiliate_network" name="affiliate_network" value="{{ store.affiliate_network if store else '' }}" placeholder="t.ex. Adtraction, Awin, Tradedoubler" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="affiliate_params">Affiliate-parametrar</label>
                <input type="text" id="affiliate_params" name="affiliate_params" value="{{ store.affiliate_params if store else '' }}" placeholder="t.ex. aff_id=123&click_id=456" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="return_policy">Returpolicy</label>
                <textarea id="return_policy" name="return_policy" rows="3" class="form-input">{{ store.return_policy if store else '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="verified" value="1" {% if store and store.verified %}checked{% endif %}>
                    Verifierad butik
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Spara</button>
                <a href="{{ url_for('admin.stores') }}" class="btn btn-secondary">Avbryt</a>
            </div>
        </form>
    </div>
</div>

<style>
.edit-form { max-width: 600px; background: var(--aurora-card); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid #e2e8f0; }
.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
.form-actions { display: flex; gap: 1rem; }
</style>
{% endblock %}
