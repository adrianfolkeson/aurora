{% extends "base.html" %}

{% block title %}{% if product %}Redigera{% else %}Lägg till{% endif %} produkt - Aurora Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="container">
        <h1><i class="bi bi-box"></i> {% if product %}Redigera{% else %}Lägg till{% endif %} produkt</h1>
        
        <form method="POST" class="edit-form">
            <div class="form-group">
                <label for="name">Produktnamn *</label>
                <input type="text" id="name" name="name" value="{{ product.name if product else '' }}" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="brand">Varumärke</label>
                <input type="text" id="brand" name="brand" value="{{ product.brand if product else '' }}" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="category_id">Kategori</label>
                <select id="category_id" name="category_id" class="form-input">
                    <option value="">Välj kategori</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="ean">EAN</label>
                <input type="text" id="ean" name="ean" value="{{ product.ean if product else '' }}" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="image_url">Bild-URL</label>
                <input type="url" id="image_url" name="image_url" value="{{ product.image_url if product else '' }}" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="description">Beskrivning</label>
                <textarea id="description" name="description" rows="5" class="form-input">{{ product.description if product else '' }}</textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Spara</button>
                <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Avbryt</a>
            </div>
        </form>
    </div>
</div>

<style>
.edit-form { max-width: 600px; background: var(--aurora-card); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid #e2e8f0; }
.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
.form-actions { display: flex; gap: 1rem; }
</style>
{% endblock %}
